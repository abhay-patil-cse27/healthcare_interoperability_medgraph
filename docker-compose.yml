version: "3.9"

services:
  # ── Databases ─────────────────────────────────────────────────────────────

  mongodb:
    image: mongo:7.0
    container_name: medgraph-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: medgraph
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medgraph-network

  neo4j:
    image: neo4j:5.18
    container_name: medgraph-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/medgraph123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "medgraph123", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - medgraph-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: medgraph-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medgraph-network

  # ── Application ───────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medgraph-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override localhost refs to use Docker service names
      MONGODB_URL: mongodb://mongodb:27017
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_HOST: qdrant
    depends_on:
      mongodb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - medgraph-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medgraph-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - medgraph-network
    restart: unless-stopped

volumes:
  mongo_data:
  neo4j_data:
  qdrant_data:

networks:
  medgraph-network:
    driver: bridge
